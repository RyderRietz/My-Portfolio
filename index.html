<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      max-width: 700px;
    }

    .headshot-wrapper {
      display: inline-block;
      border-radius: 50%;
      overflow: hidden;
      width: 200px;
      height: 200px;
      border: 4px solid #4f8ef7;
      box-shadow: 0 0 30px rgba(79, 142, 247, 0.4);
      margin-bottom: 32px;
    }

    .headshot-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 1.1rem;
      color: #a0a0a0;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .links a {
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .btn-primary {
      background: #4f8ef7;
      color: #fff;
    }

    .btn-secondary {
      background: transparent;
      color: #f0f0f0;
      border: 2px solid #333;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="headshot-wrapper">
      <img src="headshot.jpg" alt="Profile photo" />
    </div>
    <h1>Hey, I'm Ryder Rietz</h1>
    <p class="tagline">
      Welcome to my portfolio. I build things and love what I do.<br />
      Feel free to explore my work and get in touch.
    </p>
    <div class="links">
      <a href="#" class="btn-primary">View My Work</a>
      <a href="#" class="btn-secondary">Contact Me</a>
    </div>
  </div>
</body>
</html>
